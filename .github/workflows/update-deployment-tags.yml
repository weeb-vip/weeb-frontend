name: Update Deployment Tags

on:
  workflow_dispatch:
  schedule:
    # Run daily at 2 AM UTC to keep tags fresh
    - cron: '0 2 * * *'

jobs:
  update-tags:
    runs-on: ubuntu-latest
    name: Update Deployment Tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Update deployment tags
        id: update-tags
        run: |
          echo "🔄 Updating deployment tags..."
          node scripts/update-deployment-tags.js

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes to deployment tags"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected in deployment tags"
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'ci: update deployment tags'
          title: 'ci: Update deployment tags'
          body: |
            ## 🔄 Auto-generated PR to update deployment tags

            This PR updates the available Git tags in the Cloudflare deployment workflow.

            ### Tags included:
            - Check the diff to see the updated tag list

            ---
            *This PR was automatically generated by the Update Deployment Tags workflow*
          branch: update-deployment-tags
          delete-branch: true
          labels: |
            automation
            ci