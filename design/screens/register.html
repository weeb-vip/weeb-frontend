<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — weeb.vip</title>
  <style>
    :root {
      --bg: oklch(14% 0.015 275);
      --bg-elevated: oklch(18% 0.018 275);
      --surface: oklch(22% 0.02 275);
      --surface-hover: oklch(26% 0.022 275);
      --fg: oklch(95% 0.005 265);
      --fg-secondary: oklch(70% 0.01 270);
      --fg-muted: oklch(55% 0.01 270);
      --border: oklch(28% 0.015 275);
      --accent: oklch(55% 0.15 280);
      --accent-hover: oklch(62% 0.16 280);
      --violet: oklch(62% 0.14 300);
      --green: oklch(65% 0.15 155);
      --amber: oklch(72% 0.14 85);
      --red: oklch(60% 0.18 25);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      --radius: 8px;
      --radius-lg: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-family: var(--font); color: var(--fg); background: var(--bg); -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; border: none; background: none; cursor: pointer; }

    /* --- NAV --- */
    .nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px; height: 60px;
      background: oklch(14% 0.015 275 / 0.85);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 18px; letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .nav-logo-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: white;
    }
    .nav-links {
      display: flex; gap: 4px; margin-left: 24px;
    }
    .nav-links a {
      padding: 6px 14px; border-radius: 6px;
      font-size: 14px; font-weight: 500; color: var(--fg-secondary);
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--fg); background: var(--surface);
    }
    .nav-search {
      margin-left: auto; position: relative;
    }
    .nav-search input {
      width: 260px; padding: 8px 12px 8px 36px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--fg); font-size: 14px;
      outline: none; transition: border-color 0.15s, width 0.2s;
    }
    .nav-search input:focus { border-color: var(--accent); width: 320px; }
    .nav-search input::placeholder { color: var(--fg-muted); }
    .nav-search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--fg-muted); pointer-events: none;
    }
    .nav-auth {
      display: flex; gap: 8px; margin-left: 16px;
    }
    .btn-ghost-nav {
      padding: 7px 16px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; color: var(--fg-secondary);
      transition: color 0.15s, background 0.15s;
    }
    .btn-ghost-nav:hover { color: var(--fg); background: var(--surface); }
    .btn-primary-nav {
      padding: 7px 18px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600;
      background: var(--accent); color: white;
      transition: background 0.15s;
    }
    .btn-primary-nav:hover { background: var(--accent-hover); }

    /* --- ANIMATED BG --- */
    .page-bg {
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(135deg, oklch(16% 0.025 280), oklch(14% 0.015 270), oklch(15% 0.02 295));
      background-size: 400% 400%;
      animation: bgShift 30s ease infinite;
    }
    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* --- MAIN CONTENT --- */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 16px 40px;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* --- LOGO --- */
    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .logo-mark {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      display: flex; align-items: center; justify-content: center;
    }
    .logo-wordmark {
      font-family: var(--font-mono);
      font-size: 15px; font-weight: 600;
      letter-spacing: 0.04em; color: var(--fg);
    }

    /* --- CARD --- */
    .card {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
      box-shadow: 0 4px 24px oklch(0% 0 0 / 0.3), 0 1px 3px oklch(0% 0 0 / 0.2);
    }

    .card-header {
      margin-bottom: 28px;
      text-align: center;
    }
    .card-title {
      font-size: 24px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--fg);
      margin-bottom: 4px;
    }
    .card-subtitle {
      font-size: 14px; color: var(--fg-muted);
    }

    /* --- FORM --- */
    form {
      display: flex; flex-direction: column; gap: 18px;
    }
    .field {
      display: flex; flex-direction: column; gap: 6px;
    }
    label {
      font-size: 13px; font-weight: 500; color: var(--fg-secondary);
      letter-spacing: 0.01em;
    }
    .input-wrap {
      position: relative;
    }
    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%; height: 44px;
      padding: 0 16px;
      font-family: var(--font); font-size: 15px;
      color: var(--fg);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--fg-muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(55% 0.15 280 / 0.2);
    }
    input.has-toggle { padding-right: 46px; }

    input.state-error {
      border-color: var(--red);
      background: oklch(20% 0.03 25);
    }
    input.state-error:focus {
      box-shadow: 0 0 0 3px oklch(60% 0.18 25 / 0.2);
    }
    input.state-success {
      border-color: var(--green);
    }
    input.state-success:focus {
      box-shadow: 0 0 0 3px oklch(65% 0.15 155 / 0.2);
    }

    /* --- PASSWORD TOGGLE --- */
    .toggle-btn {
      position: absolute; right: 0; top: 0;
      height: 44px; width: 44px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--fg-muted);
      border-radius: 0 var(--radius) var(--radius) 0;
      transition: color 0.15s;
    }
    .toggle-btn:hover { color: var(--fg); }

    /* --- PASSWORD STRENGTH --- */
    .strength-wrap {
      display: none; flex-direction: column; gap: 6px;
      margin-top: 4px;
    }
    .strength-wrap.visible { display: flex; }
    .strength-bars {
      display: flex; gap: 4px;
    }
    .strength-bar {
      flex: 1; height: 4px;
      background: var(--border);
      border-radius: 99px;
      transition: background 0.25s;
    }
    .strength-label {
      font-size: 11px; color: var(--fg-muted);
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    .strength-wrap[data-level="weak"] .strength-bar:nth-child(1) { background: var(--red); }
    .strength-wrap[data-level="medium"] .strength-bar:nth-child(1),
    .strength-wrap[data-level="medium"] .strength-bar:nth-child(2) { background: var(--amber); }
    .strength-wrap[data-level="strong"] .strength-bar:nth-child(1),
    .strength-wrap[data-level="strong"] .strength-bar:nth-child(2),
    .strength-wrap[data-level="strong"] .strength-bar:nth-child(3) { background: var(--green); }

    .strength-wrap[data-level="weak"] .strength-label { color: var(--red); }
    .strength-wrap[data-level="medium"] .strength-label { color: var(--amber); }
    .strength-wrap[data-level="strong"] .strength-label { color: var(--green); }

    /* --- FIELD ERROR --- */
    .field-error {
      font-size: 12px; color: var(--red);
      display: none;
    }
    .field-error.visible { display: block; }

    /* --- SUBMIT BUTTON --- */
    .btn-primary {
      width: 100%; height: 46px;
      margin-top: 4px;
      background: var(--accent); color: white;
      font-family: var(--font); font-size: 15px; font-weight: 600;
      letter-spacing: 0.01em;
      border: none; border-radius: var(--radius);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s, transform 0.1s;
      position: relative; overflow: hidden;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:active:not(:disabled) { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary.loading .btn-label { opacity: 0; }
    .btn-primary .spinner {
      display: none; position: absolute;
      width: 18px; height: 18px;
      border: 2px solid oklch(100% 0 0 / 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-primary.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- CARD FOOTER --- */
    .card-footer {
      text-align: center; font-size: 14px; color: var(--fg-muted);
      margin-top: 20px;
    }
    .card-footer a {
      color: var(--accent); text-decoration: none; font-weight: 500;
      transition: color 0.15s;
    }
    .card-footer a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* --- FOOTER --- */
    .footer {
      padding: 40px 48px; margin-top: auto;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; color: var(--fg-muted);
    }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { color: var(--fg-secondary); transition: color 0.15s; }
    .footer-links a:hover { color: var(--fg); }

    /* --- RESPONSIVE --- */
    @media (max-width: 1024px) {
      .footer { padding: 32px 24px; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-search input { width: 180px; }
      .nav-search input:focus { width: 220px; }
      .footer { flex-direction: column; gap: 16px; text-align: center; }
    }
    @media (max-width: 480px) {
      .nav { padding: 0 16px; }
      .nav-auth { display: none; }
      .nav-search input { width: 140px; }
      .nav-search input:focus { width: 180px; }
      .main { padding: 40px 16px 24px; }
      .card { padding: 24px; }
      .card-title { font-size: 20px; }
      .footer { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<!-- ANIMATED BG -->
<div class="page-bg"></div>

<!-- NAV -->
<nav class="nav">
  <a href="homepage.html" class="nav-logo">
    <span class="nav-logo-icon">w</span>
    <span>weeb.vip</span>
  </a>
  <div class="nav-links">
    <a href="homepage.html">Home</a>
    <a href="season.html">Season</a>
    <a href="airing.html">Airing</a>
    <a href="search.html">Browse</a>
  </div>
  <div class="nav-search">
    <svg class="nav-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search anime...">
  </div>
  <div class="nav-auth">
    <a href="login.html" class="btn-ghost-nav">Log in</a>
    <a href="register.html" class="btn-primary-nav">Sign up</a>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="auth-wrapper">

    <!-- Logo -->
    <a href="homepage.html" class="logo-block" aria-label="weeb.vip - back to homepage">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M4 5L8.5 16L11 10L13.5 16L18 5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="11" cy="11" r="1.2" fill="white" opacity="0.7"/>
        </svg>
      </div>
      <span class="logo-wordmark">weeb.vip</span>
    </a>

    <!-- Card -->
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Create your account</h1>
        <p class="card-subtitle">Start tracking your anime</p>
      </div>

      <form id="register-form" novalidate>

        <!-- Username -->
        <div class="field" id="field-username">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              placeholder="your_username"
              spellcheck="false"
            />
          </div>
          <span class="field-error" id="error-username">Please enter a username.</span>
        </div>

        <!-- Email -->
        <div class="field" id="field-email">
          <label for="email">Email</label>
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="you@example.com"
              spellcheck="false"
            />
          </div>
          <span class="field-error" id="error-email">Please enter a valid email address.</span>
        </div>

        <!-- Password -->
        <div class="field" id="field-password">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="new-password"
              placeholder="At least 8 characters"
              class="has-toggle"
            />
            <button type="button" class="toggle-btn" id="toggle-password" aria-label="Show password" aria-pressed="false">
              <svg id="icon-eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.636-7 10-7 10 7 10 7-3.636 7-10 7S2 12 2 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="icon-eye-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <!-- Strength indicator -->
          <div class="strength-wrap" id="strength-wrap" aria-live="polite">
            <div class="strength-bars">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>
          <span class="field-error" id="error-password">Password must be at least 8 characters.</span>
        </div>

        <!-- Confirm password -->
        <div class="field" id="field-confirm">
          <label for="confirm-password">Confirm password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              autocomplete="new-password"
              placeholder="Re-enter your password"
              class="has-toggle"
            />
            <button type="button" class="toggle-btn" id="toggle-confirm" aria-label="Show password" aria-pressed="false">
              <svg id="icon-eye-show-c" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.636-7 10-7 10 7 10 7-3.636 7-10 7S2 12 2 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="icon-eye-hide-c" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="error-confirm">Passwords do not match.</span>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-label">Create account</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>

      </form>

      <!-- Footer -->
      <div class="card-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <span>&copy; 2026 weeb.vip</span>
  <div class="footer-links">
    <a href="#">About</a>
    <a href="#">API</a>
    <a href="#">GitHub</a>
  </div>
</footer>

<script>
(function () {
  'use strict';

  var form         = document.getElementById('register-form');
  var usernameEl   = document.getElementById('username');
  var emailEl      = document.getElementById('email');
  var passwordEl   = document.getElementById('password');
  var confirmEl    = document.getElementById('confirm-password');
  var toggleBtn    = document.getElementById('toggle-password');
  var toggleConfirm = document.getElementById('toggle-confirm');
  var submitBtn    = document.getElementById('submit-btn');
  var strengthWrap = document.getElementById('strength-wrap');
  var strengthLabel = document.getElementById('strength-label');

  /* -- Password toggles -- */
  function makeToggle(btn, input, showIcon, hideIcon) {
    btn.addEventListener('click', function () {
      var isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      showIcon.style.display = isHidden ? 'none' : '';
      hideIcon.style.display = isHidden ? '' : 'none';
      btn.setAttribute('aria-pressed', String(isHidden));
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      input.focus();
    });
  }

  makeToggle(
    toggleBtn, passwordEl,
    document.getElementById('icon-eye-show'),
    document.getElementById('icon-eye-hide')
  );
  makeToggle(
    toggleConfirm, confirmEl,
    document.getElementById('icon-eye-show-c'),
    document.getElementById('icon-eye-hide-c')
  );

  /* -- Password strength -- */
  function getStrength(pw) {
    if (!pw) return null;
    var score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    if (score <= 2) return 'weak';
    if (score <= 4) return 'medium';
    return 'strong';
  }

  function updateStrength(pw) {
    var level = getStrength(pw);
    if (!level) {
      strengthWrap.classList.remove('visible');
      strengthWrap.removeAttribute('data-level');
      return;
    }
    strengthWrap.classList.add('visible');
    strengthWrap.setAttribute('data-level', level);
    var labels = { weak: 'Weak', medium: 'Medium', strong: 'Strong' };
    strengthLabel.textContent = labels[level];
  }

  passwordEl.addEventListener('input', function () {
    updateStrength(passwordEl.value);
    if (passwordEl.classList.contains('state-error') && passwordEl.value.length >= 8) {
      clearError(passwordEl, 'error-password');
    }
    if (confirmEl.value) validateConfirm();
  });

  /* -- Validation helpers -- */
  function setError(inputEl, errorId, message) {
    var errorEl = document.getElementById(errorId);
    inputEl.classList.add('state-error');
    inputEl.classList.remove('state-success');
    if (message) errorEl.textContent = message;
    errorEl.classList.add('visible');
    inputEl.setAttribute('aria-invalid', 'true');
  }

  function clearError(inputEl, errorId) {
    var errorEl = document.getElementById(errorId);
    inputEl.classList.remove('state-error');
    errorEl.classList.remove('visible');
    inputEl.removeAttribute('aria-invalid');
  }

  function setSuccess(inputEl) {
    inputEl.classList.add('state-success');
    inputEl.classList.remove('state-error');
  }

  /* -- Field validators -- */
  function validateUsername() {
    var val = usernameEl.value.trim();
    if (!val) {
      setError(usernameEl, 'error-username', 'Please enter a username.');
      return false;
    }
    if (val.length < 3) {
      setError(usernameEl, 'error-username', 'Username must be at least 3 characters.');
      return false;
    }
    if (!/^[A-Za-z0-9_.\-]+$/.test(val)) {
      setError(usernameEl, 'error-username', 'Only letters, numbers, _, . and - allowed.');
      return false;
    }
    clearError(usernameEl, 'error-username');
    setSuccess(usernameEl);
    return true;
  }

  function validateEmail() {
    var val = emailEl.value.trim();
    var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!val) {
      setError(emailEl, 'error-email', 'Please enter your email address.');
      return false;
    }
    if (!emailRe.test(val)) {
      setError(emailEl, 'error-email', 'Please enter a valid email address.');
      return false;
    }
    clearError(emailEl, 'error-email');
    setSuccess(emailEl);
    return true;
  }

  function validatePassword() {
    var val = passwordEl.value;
    if (!val) {
      setError(passwordEl, 'error-password', 'Please enter a password.');
      return false;
    }
    if (val.length < 8) {
      setError(passwordEl, 'error-password', 'Password must be at least 8 characters.');
      return false;
    }
    clearError(passwordEl, 'error-password');
    setSuccess(passwordEl);
    return true;
  }

  function validateConfirm() {
    var val = confirmEl.value;
    if (!val) {
      setError(confirmEl, 'error-confirm', 'Please confirm your password.');
      return false;
    }
    if (val !== passwordEl.value) {
      setError(confirmEl, 'error-confirm', 'Passwords do not match.');
      return false;
    }
    clearError(confirmEl, 'error-confirm');
    setSuccess(confirmEl);
    return true;
  }

  /* -- Live validation on blur -- */
  usernameEl.addEventListener('blur', function () {
    if (usernameEl.value) validateUsername();
  });
  emailEl.addEventListener('blur', function () {
    if (emailEl.value) validateEmail();
  });
  passwordEl.addEventListener('blur', function () {
    if (passwordEl.value) validatePassword();
  });
  confirmEl.addEventListener('blur', function () {
    if (confirmEl.value) validateConfirm();
  });

  /* -- Clear errors on input -- */
  function onInput(inputEl, errorId) {
    inputEl.addEventListener('input', function () {
      if (inputEl.classList.contains('state-error')) {
        clearError(inputEl, errorId);
      }
    });
  }

  onInput(usernameEl, 'error-username');
  onInput(emailEl, 'error-email');
  onInput(confirmEl, 'error-confirm');

  /* -- Submit -- */
  form.addEventListener('submit', function (e) {
    e.preventDefault();

    var u  = validateUsername();
    var em = validateEmail();
    var p  = validatePassword();
    var c  = validateConfirm();

    if (!u)  { usernameEl.focus(); return; }
    if (!em) { emailEl.focus(); return; }
    if (!p)  { passwordEl.focus(); return; }
    if (!c)  { confirmEl.focus(); return; }

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');

    setTimeout(function () {
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
    }, 1800);
  });

})();
</script>
</body>
</html>
